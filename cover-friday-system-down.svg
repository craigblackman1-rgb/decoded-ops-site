<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#ef4444" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#ef4444" stop-opacity="1"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redLineV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#ef4444" stop-opacity="0.6"/>
      <stop offset="0.85" stop-color="#ef4444" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#grid)"/>
  <rect width="1200" height="627" fill="url(#glow)"/>

  <!-- Server rack outline - left side -->
  <g transform="translate(80, 140)">
    <!-- Rack frame -->
    <rect x="0" y="0" width="160" height="350" rx="4" fill="none" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Server units -->
    <rect x="10" y="20" width="140" height="30" rx="2" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>
    <rect x="10" y="60" width="140" height="30" rx="2" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>
    <rect x="10" y="100" width="140" height="30" rx="2" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>
    
    <!-- Glitching server -->
    <rect x="10" y="140" width="140" height="30" rx="2" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.6;1;0.3;1;0.8;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Server with red X -->
    <rect x="10" y="180" width="140" height="30" rx="2" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
    <line x1="50" y1="190" x2="110" y2="200" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="110" y1="190" x2="50" y2="200" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    
    <rect x="10" y="220" width="140" height="30" rx="2" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>
    <rect x="10" y="260" width="140" height="30" rx="2" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>
    <rect x="10" y="300" width="140" height="30" rx="2" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>

    <!-- Blinking red LED -->
    <circle cx="155" cy="335" r="4" fill="#ef4444" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;0.2;1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Central red vertical line -->
  <rect x="300" y="80" width="2" height="467" fill="url(#redLineV)"/>

  <!-- Main copy -->
  <g transform="translate(340, 100)">
    <!-- First line -->
    <text x="0" y="0" fill="#94a3b8" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="20" font-weight="400" letter-spacing="1">
      It was a Friday evening.
    </text>
    
    <!-- Second line - system went down -->
    <text x="0" y="50" fill="#ef4444" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="32" font-weight="700" letter-spacing="1.5" filter="url(#softGlow)">
      The system went down.
      <animate attributeName="opacity" values="1;0.7;1;0.5;1;0.8;1" dur="4s" repeatCount="indefinite"/>
    </text>
    
    <!-- Third line -->
    <text x="0" y="100" fill="#64748b" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="20" font-weight="400" letter-spacing="1">
      Nobody knew why.
    </text>

    <!-- Horizontal red accent -->
    <rect x="0" y="130" width="60" height="2" fill="#ef4444" opacity="0.6"/>
  </g>

  <!-- Story excerpt -->
  <g transform="translate(340, 260)">
    <text x="0" y="0" fill="#475569" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" font-weight="400" letter-spacing="0.5">
      Not a scheduled maintenance window.
    </text>
    <text x="0" y="24" fill="#475569" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" font-weight="400" letter-spacing="0.5">
      Not a warning.
    </text>
    <text x="0" y="48" fill="#475569" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" font-weight="400" letter-spacing="0.5">
      Just — gone.
    </text>
    <text x="0" y="72" fill="#475569" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="12" font-weight="400" letter-spacing="0.5">
      Does your business have a recovery plan?
    </text>
  </g>

  <!-- CTA box -->
  <g transform="translate(340, 410)">
    <rect x="0" y="0" width="280" height="50" rx="4" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <text x="140" y="30" fill="#ef4444" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="1.5">
      FREE 60-MINUTE DISCOVERY CALL
    </text>
  </g>

  <!-- Bottom horizontal red line -->
  <rect x="0" y="570" width="1200" height="1" fill="url(#redLine)"/>

  <!-- Decoded Ops branding -->
  <g transform="translate(340, 555)">
    <text x="0" y="0" fill="#334155" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="3">
      DECODED OPS
    </text>
  </g>

  <!-- Right side decorative elements -->
  <g transform="translate(1060, 140)">
    <!-- Abstract data stream -->
    <text x="0" y="0" fill="#1e293b" font-family="monospace" font-size="10">01010</text>
    <text x="0" y="20" fill="#1e293b" font-family="monospace" font-size="10">10110</text>
    <text x="0" y="40" fill="#1e293b" font-family="monospace" font-size="10">01100</text>
    <text x="0" y="60" fill="#ef4444" font-family="monospace" font-size="10" opacity="0.3">ERR 01</text>
    <text x="0" y="80" fill="#1e293b" font-family="monospace" font-size="10">11010</text>
    <text x="0" y="100" fill="#1e293b" font-family="monospace" font-size="10">00101</text>
    <text x="0" y="120" fill="#ef4444" font-family="monospace" font-size="10" opacity="0.3">ERR 07</text>
    <text x="0" y="140" fill="#1e293b" font-family="monospace" font-size="10">10010</text>
  </g>

  <!-- Warning triangle -->
  <g transform="translate(1060, 360)" opacity="0.15">
    <polygon points="40,0 80,60 0,60" fill="none" stroke="#ef4444" stroke-width="2"/>
    <line x1="40" y1="20" x2="40" y2="42" stroke="#ef4444" stroke-width="2"/>
    <circle cx="40" cy="52" r="2" fill="#ef4444"/>
  </g>
</svg>
