<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <style>
      .prussian-blue-bg { fill: #023047; }
      .cerulean { fill: #219EBC; }
      .sky-blue { fill: #8ECAE6; }
      .amber { fill: #FFB703; }
      .orange { fill: #FB8500; }
      .white { fill: #FFFFFF; }
      .text-title { font-size: 48px; font-weight: bold; }
      .text-heading { font-size: 28px; font-weight: bold; }
      .text-body { font-size: 20px; }
      .text-center { text-anchor: middle; }
      .icon-fill { fill: #FFFFFF; }
      .icon-stroke-cerulean { stroke: #219EBC; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-stroke-red { stroke: #FF0000; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="630" class="prussian-blue-bg"/>
  <text x="600" y="70" class="text-title text-center sky-blue">What Happens When Your Systems Go Down</text>
  <g transform="translate(600, 250)">
    <polygon points="0,-80 -70,50 70,50" class="amber"/>
    <text x="0" y="20" class="text-center prussian-blue-bg" font-size="80px" font-weight="bold">!</text>
    <g transform="translate(0, 120)">
      <rect x="-60" y="-40" width="120" height="80" rx="8" ry="8" class="cerulean"/>
      <rect x="-50" y="-25" width="100" height="10" rx="2" ry="2" class="sky-blue"/>
      <rect x="-50" y="-5" width="100" height="10" rx="2" ry="2" class="sky-blue"/>
      <rect x="-50" y="15" width="100" height="10" rx="2" ry="2" class="sky-blue"/>
      <line x1="-70" y1="-50" x2="70" y2="50" class="icon-stroke-red"/>
      <line x1="70" y1="-50" x2="-70" y2="50" class="icon-stroke-red"/>
    </g>
    <text x="0" y="300" class="text-heading text-center orange">SYSTEMS OFFLINE</text>
  </g>
  <g transform="translate(150, 150)">
    <text x="0" y="0" class="text-heading cerulean">The Cost of Downtime</text>
    <g transform="translate(0, 70)">
      <path d="M-20,0 H20 L15,20 H-15 L-20,0 Z M-10,20 H10 V30 H-10 Z" class="icon-fill"/>
      <line x1="-25" y1="-5" x2="25" y2="35" class="icon-stroke-red"/>
      <line x1="25" y1="-5" x2="-25" y2="35" class="icon-stroke-red"/>
      <text x="50" y="20" class="text-body white">Lost Production & Orders</text>
    </g>
    <g transform="translate(0, 150)">
      <path d="M0,0 L-25,20 V50 L0,60 L25,50 V20 Z" class="icon-fill"/>
      <line x1="-15" y1="25" x2="15" y2="45" class="icon-stroke-red"/>
      <line x1="15" y1="25" x2="-15" y2="45" class="icon-stroke-red"/>
      <text x="50" y="20" class="text-body white">Damaged Reputation</text>
    </g>
    <g transform="translate(0, 230)">
      <path d="M0,0 L-15,15 L0,30 L15,15 Z" class="icon-fill"/>
      <path d="M-10,10 L-25,25 L-10,40 L5,25 Z" class="icon-fill"/>
      <path d="M10,10 L-5,25 L10,40 L25,25 Z" class="icon-fill"/>
      <line x1="0" y1="0" x2="0" y2="40" class="icon-stroke-red"/>
      <text x="50" y="20" class="text-body white">Revenue Loss</text>
    </g>
    <g transform="translate(0, 310)">
      <circle cx="0" cy="0" r="25" class="icon-fill"/>
      <circle cx="-10" cy="-5" r="3" fill="red"/>
      <circle cx="10" cy="-5" r="3" fill="red"/>
      <path d="M-10,10 A10 10 0 0 0 10 10" stroke="red" stroke-width="3" fill="none"/>
      <text x="50" y="20" class="text-body white">Employee Frustration</text>
    </g>
  </g>
  <g transform="translate(850, 150)">
    <text x="0" y="0" class="text-heading cerulean">Business Continuity & Recovery</text>
    <g transform="translate(0, 70)">
      <path d="M-25,20 A15 15 0 0 1 0,5 A20 20 0 0 1 25,20 H-25 Z" class="icon-fill"/>
      <path d="M0,35 L-10,25 H-5 V10 H5 V25 H10 Z" class="orange"/>
      <text x="50" y="20" class="text-body white">Data Backup & Recovery</text>
    </g>
    <g transform="translate(0, 150)">
      <rect x="-30" y="0" width="25" height="30" rx="3" ry="3" class="icon-fill"/>
      <rect x="5" y="0" width="25" height="30" rx="3" ry="3" class="icon-fill"/>
      <line x1="-17" y1="10" x2="17" y2="10" class="icon-stroke-cerulean"/>
      <line x1="-17" y1="20" x2="17" y2="20" class="icon-stroke-cerulean"/>
      <text x="50" y="20" class="text-body white">System Redundancy</text>
    </g>
    <g transform="translate(0, 230)">
      <rect x="-25" y="0" width="50" height="40" rx="5" ry="5" class="icon-fill"/>
      <line x1="-15" y1="10" x2="15" y2="10" class="icon-stroke-cerulean"/>
      <line x1="-15" y1="20" x2="15" y2="20" class="icon-stroke-cerulean"/>
      <line x1="-15" y1="30" x2="15" y2="30" class="icon-stroke-cerulean"/>
      <text x="50" y="20" class="text-body white">Disaster Recovery Plan</text>
    </g>
    <g transform="translate(0, 310)">
      <circle cx="0" cy="10" r="10" class="icon-fill"/>
      <rect x="-15" y="20" width="30" height="20" class="icon-fill"/>
      <path d="M30,10 A15 15 0 1 0 0,10 A15 15 0 0 0 30,10 Z M15,10 L15,0 M15,20 L15,30 M5,15 L-5,15 M25,15 L35,15" class="icon-stroke-cerulean"/>
      <text x="50" y="20" class="text-body white">Staff Training</text>
    </g>
  </g>
</svg>