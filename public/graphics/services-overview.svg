<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'DM Sans', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8ECF0"/>
    </linearGradient>
    <linearGradient id="clarity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#219EBC"/>
      <stop offset="100%" stop-color="#1A7D95"/>
    </linearGradient>
    <linearGradient id="deliver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#023047"/>
      <stop offset="100%" stop-color="#011B2A"/>
    </linearGradient>
    <linearGradient id="transform" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB703"/>
      <stop offset="100%" stop-color="#E5A502"/>
    </linearGradient>
    <linearGradient id="retained" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB8500"/>
      <stop offset="100%" stop-color="#D97300"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8ECAE6"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L5,10 L10,0 Z" fill="#8ECAE6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="28" font-weight="800" fill="#023047" font-family="'Outfit', Arial, sans-serif">Four Services, One Clear Path</text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="#023047" opacity="0.5">From diagnosis to ongoing operational leadership</text>

  <!-- Central arrow path -->
  <path d="M 100 140 L 1100 140" stroke="#8ECAE6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRight)" opacity="0.4"/>
  <path d="M 600 140 L 600 740" stroke="#8ECAE6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowDown)" opacity="0.4"/>

  <!-- ============ DIAGNOSE (top-left) ============ -->
  <g transform="translate(80, 100)">
    <!-- Step label -->
    <rect x="120" y="20" width="100" height="26" rx="13" fill="#023047" opacity="0.08"/>
    <text x="170" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#023047" letter-spacing="1">STEP 1</text>

    <!-- Clarity card -->
    <rect x="0" y="60" width="340" height="260" rx="16" fill="white" filter="url(#shadow)"/>
    <!-- Color bar -->
    <rect x="0" y="60" width="340" height="6" rx="3" fill="url(#clarity)"/>

    <rect x="20" y="82" width="40" height="40" rx="10" fill="#219EBC" opacity="0.1"/>
    <text x="40" y="108" text-anchor="middle" font-size="20" fill="#219EBC">🔍</text>

    <text x="72" y="102" font-size="20" font-weight="700" fill="#023047" font-family="'Outfit', Arial, sans-serif">Clarity</text>
    <text x="72" y="120" font-size="12" fill="#219EBC" font-weight="600">Operational &amp; Technology Audit</text>

    <text x="20" y="152" font-size="12" fill="#023047" opacity="0.7" line-height="1.5">The diagnostic. One day on-site or a remote</text>
    <text x="20" y="170" font-size="12" fill="#023047" opacity="0.7">session. Six areas assessed. A written report</text>
    <text x="20" y="188" font-size="12" fill="#023047" opacity="0.7">with quantified findings and costed</text>
    <text x="20" y="206" font-size="12" fill="#023047" opacity="0.7">recommendations. Fixed fee.</text>

    <rect x="20" y="226" width="300" height="36" rx="10" fill="#023047" opacity="0.05"/>
    <text x="170" y="249" text-anchor="middle" font-size="11" font-weight="600" fill="#023047">£2,500 – £12,000 fixed</text>

    <!-- Audit areas -->
    <g transform="translate(20, 270)">
      <circle cx="6" cy="0" r="3" fill="#219EBC"/>
      <text x="14" y="4" font-size="10" fill="#023047" opacity="0.5">6 audit areas</text>
      <circle cx="106" cy="0" r="3" fill="#219EBC"/>
      <text x="114" y="4" font-size="10" fill="#023047" opacity="0.5">3x Guarantee</text>
      <circle cx="216" cy="0" r="3" fill="#219EBC"/>
      <text x="224" y="4" font-size="10" fill="#023047" opacity="0.5">No minimum</text>
    </g>
  </g>

  <!-- ============ EXECUTE (top-right) ============ -->
  <g transform="translate(520, 100)">
    <!-- Step label -->
    <rect x="120" y="20" width="100" height="26" rx="13" fill="#023047" opacity="0.08"/>
    <text x="170" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#023047" letter-spacing="1">STEP 2</text>

    <!-- Deliver card -->
    <rect x="0" y="60" width="340" height="260" rx="16" fill="white" filter="url(#shadow)"/>
    <rect x="0" y="60" width="340" height="6" rx="3" fill="url(#deliver)"/>

    <rect x="20" y="82" width="40" height="40" rx="10" fill="#023047" opacity="0.08"/>
    <text x="40" y="108" text-anchor="middle" font-size="20">⚙️</text>

    <text x="72" y="102" font-size="20" font-weight="700" fill="#023047" font-family="'Outfit', Arial, sans-serif">Deliver</text>
    <text x="72" y="120" font-size="12" fill="#023047" font-weight="600">Project Delivery &amp; Vendor Management</text>

    <text x="20" y="152" font-size="12" fill="#023047" opacity="0.7">Vendor brief writing, procurement,</text>
    <text x="20" y="170" font-size="12" fill="#023047" opacity="0.7">implementation oversight, and sign-off.</text>
    <text x="20" y="188" font-size="12" fill="#023047" opacity="0.7">Includes monthly capability workshops</text>
    <text x="20" y="206" font-size="12" fill="#023047" opacity="0.7">that leave tools with your team.</text>

    <rect x="20" y="226" width="300" height="36" rx="10" fill="#023047" opacity="0.05"/>
    <text x="170" y="249" text-anchor="middle" font-size="11" font-weight="600" fill="#023047">£1,050 – £2,500 / month</text>

    <g transform="translate(20, 270)">
      <circle cx="6" cy="0" r="3" fill="#023047"/>
      <text x="14" y="4" font-size="10" fill="#023047" opacity="0.5">3-month minimum</text>
      <circle cx="126" cy="0" r="3" fill="#023047"/>
      <text x="134" y="4" font-size="10" fill="#023047" opacity="0.5">Capability transfer</text>
    </g>
  </g>

  <!-- Arrow from Clarity to Deliver -->
  <line x1="420" y1="230" x2="510" y2="230" stroke="#219EBC" stroke-width="2" marker-end="url(#arrowRight)"/>
  <text x="465" y="222" text-anchor="middle" font-size="10" fill="#219EBC" font-style="italic">or direct</text>

  <!-- ============ TRANSFORM (bottom-left) ============ -->
  <g transform="translate(80, 460)">
    <!-- Step label -->
    <rect x="120" y="20" width="100" height="26" rx="13" fill="#023047" opacity="0.08"/>
    <text x="170" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#023047" letter-spacing="1">STEP 3</text>

    <!-- Transform card -->
    <rect x="0" y="60" width="340" height="260" rx="16" fill="white" filter="url(#shadow)"/>
    <rect x="0" y="60" width="340" height="6" rx="3" fill="url(#transform)"/>

    <rect x="20" y="82" width="40" height="40" rx="10" fill="#FFB703" opacity="0.15"/>
    <text x="40" y="108" text-anchor="middle" font-size="20">🔄</text>

    <text x="72" y="102" font-size="20" font-weight="700" fill="#023047" font-family="'Outfit', Arial, sans-serif">Transform</text>
    <text x="72" y="120" font-size="12" fill="#FB8500" font-weight="600">Multi-Workstream Change Programme</text>

    <text x="20" y="152" font-size="12" fill="#023047" opacity="0.7">ERP + eCommerce + process redesign</text>
    <text x="20" y="170" font-size="12" fill="#023047" opacity="0.7">rolled out as a coordinated programme.</text>
    <text x="20" y="188" font-size="12" fill="#023047" opacity="0.7">Discovery required before scoping.</text>
    <text x="20" y="206" font-size="12" fill="#023047" opacity="0.7">Small business: single focused workstream.</text>

    <rect x="20" y="226" width="300" height="36" rx="10" fill="#FFB703" opacity="0.12"/>
    <text x="170" y="249" text-anchor="middle" font-size="11" font-weight="600" fill="#023047">£1,500 – £5,000+ / month</text>

    <g transform="translate(20, 270)">
      <circle cx="6" cy="0" r="3" fill="#FB8500"/>
      <text x="14" y="4" font-size="10" fill="#023047" opacity="0.5">Milestone-based minimum</text>
    </g>
  </g>

  <!-- ============ LEAD (bottom-right) ============ -->
  <g transform="translate(520, 460)">
    <!-- Step label -->
    <rect x="120" y="20" width="100" height="26" rx="13" fill="#023047" opacity="0.08"/>
    <text x="170" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#023047" letter-spacing="1">ONGOING</text>

    <!-- Retained card -->
    <rect x="0" y="60" width="340" height="260" rx="16" fill="white" filter="url(#shadow)"/>
    <rect x="0" y="60" width="340" height="6" rx="3" fill="url(#retained)"/>

    <rect x="20" y="82" width="40" height="40" rx="10" fill="#FB8500" opacity="0.15"/>
    <text x="40" y="108" text-anchor="middle" font-size="20">🎯</text>

    <text x="72" y="102" font-size="20" font-weight="700" fill="#023047" font-family="'Outfit', Arial, sans-serif">Retained</text>
    <text x="72" y="120" font-size="12" fill="#FB8500" font-weight="600">Fractional CTO / Head of Operations</text>

    <text x="20" y="152" font-size="12" fill="#023047" opacity="0.7">Ongoing strategic and operational</text>
    <text x="20" y="170" font-size="12" fill="#023047" opacity="0.7">leadership. Roadmap ownership. Vendor</text>
    <text x="20" y="188" font-size="12" fill="#023047" opacity="0.7">management. A separate product — not a</text>
    <text x="20" y="206" font-size="12" fill="#023047" opacity="0.7">tier — for ongoing leadership needs.</text>

    <rect x="20" y="226" width="300" height="36" rx="10" fill="#FB8500" opacity="0.1"/>
    <text x="170" y="249" text-anchor="middle" font-size="11" font-weight="600" fill="#FB8500">From £1,440 / month (6-month min)</text>

    <g transform="translate(20, 270)">
      <circle cx="6" cy="0" r="3" fill="#FB8500"/>
      <text x="14" y="4" font-size="10" fill="#023047" opacity="0.5">3 levels: Advisory / Embedded / Programme</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="600" y="780" text-anchor="middle" font-size="11" fill="#023047" opacity="0.3">All services can be entered directly — no sequential path required</text>
</svg>
