<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg28" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB703"/>
      <stop offset="100%" stop-color="#FB8500"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg28)"/>
  <circle cx="1100" cy="600" r="250" fill="#FFB703" opacity="0.2"/>
