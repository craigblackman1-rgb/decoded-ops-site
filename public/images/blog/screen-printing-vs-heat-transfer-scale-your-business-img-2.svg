  <text x="60" y="142" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1" fill="#023047">KEY TAKEAWAY</text>
  <!-- Excerpt as takeaway -->
  <text x="40" y="210" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#023047">Both methods work. The question is which one fits where</text>
  <text x="40" y="248" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#023047">you&apos;re going — not where you are right now.</text>
