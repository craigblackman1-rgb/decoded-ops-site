    </linearGradient>
    <linearGradient id="badge37" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB703"/>
      <stop offset="100%" stop-color="#FB8500"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg37)"/>
  <circle cx="1050" cy="80" r="180" fill="#219EBC" opacity="0.12"/>
  <circle cx="150" cy="600" r="140" fill="#8ECAE6" opacity="0.08"/>
  <circle cx="900" cy="500" r="100" fill="#FFB703" opacity="0.06"/>
  <!-- Category badge -->
  <rect x="40" y="40" width="120" height="34" rx="17" fill="url(#badge37)"/>
  <text x="56" y="62" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="1" fill="#023047" text-transform="uppercase">WORKFLOW</text>
