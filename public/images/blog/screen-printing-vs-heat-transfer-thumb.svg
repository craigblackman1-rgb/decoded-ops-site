  <text x="40" y="155" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Screen Printing vs. Heat Transfer:</text>
  <text x="40" y="203" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Which Method Actually Makes Sense for</text>
  <text x="40" y="251" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Your Shop?</text>
